<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Todo - Premium Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --danger: #ef4444;
            --success: #10b981;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        header {
            margin-bottom: 32px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            color: var(--primary);
            margin-bottom: 8px;
        }

        p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            background: var(--card-bg);
            padding: 8px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            outline: none;
            font-size: 1rem;
            font-family: inherit;
            color: var(--text-main);
            background: transparent;
        }

        button.add-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button.add-btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        ul {
            list-style: none;
        }

        li {
            background: var(--card-bg);
            margin-bottom: 12px;
            padding: 16px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
            border: 1px solid var(--border);
            transition: transform 0.2s, box-shadow 0.2s;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        li:hover {
            transform: scale(1.01);
            box-shadow: var(--shadow);
        }

        .todo-text {
            flex: 1;
            font-size: 1rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .completed .todo-text {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .checkbox {
            width: 20px;
            height: 20px;
            border-radius: 6px;
            border: 2px solid var(--border);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .completed .checkbox {
            background-color: var(--success);
            border-color: var(--success);
        }

        .checkbox::after {
            content: '✓';
            color: white;
            font-size: 12px;
            display: none;
        }

        .completed .checkbox::after {
            display: block;
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px;
            border-radius: 6px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }

        .delete-btn:hover {
            color: var(--danger);
            background-color: #fee2e2;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-style: italic;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>Ma Todo App</h1>
            <p>Design Premium - Backend JSON</p>
        </header>

        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Quelle est la prochaine étape ?" aria-label="Nouvelle tâche">
            <button class="add-btn" onclick="addTodo()">Ajouter</button>
        </div>

        <ul id="list">
            <!-- Les tâches apparaîtront ici -->
        </ul>
    </div>

    <script src="script.js"></script>
</body>

</html>
