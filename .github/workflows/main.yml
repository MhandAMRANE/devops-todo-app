name: Pipeline CI/CD devops-todo-app

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: devops-todo-app
  REPO: ghcr.io

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4

      - name: Installer les dépendances backend
        run: npm ci --prefix backend

      - name: Vérifier la syntaxe du backend
        run: node --check backend/server.js

      - name: Ensemble de tests API locale
        run: |
          node backend/server.js &
          APP_PID=$!
          sleep 3
          curl -f http://localhost:5000/api/todos
          kill $APP_PID

  build:
    name: Build and Push
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4

      - name: Connexion à GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REPO }}
          username: ${{ github.actor }}
          password: ${{ secrets.TOKEN_CICD }}

      - name: Build de l'image Docker (backend)
        run: docker build -t ${{ env.IMAGE_NAME }} ./backend

      - name: Tagger en version courante l'image Docker
        run: docker tag ${{ env.IMAGE_NAME }} ${{ env.REPO }}/${{ github.actor }}/${{ env.IMAGE_NAME }}:1.0

      - name: Tagger en version latest l'image Docker
        run: docker tag ${{ env.IMAGE_NAME }} ${{ env.REPO }}/${{ github.actor }}/${{ env.IMAGE_NAME }}:latest

      - name: Push image version courante
        run: docker push ${{ env.REPO }}/${{ github.actor }}/${{ env.IMAGE_NAME }}:1.0

      - name: Push image version latest
        run: docker push ${{ env.REPO }}/${{ github.actor }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    name: Deploy sur VPS (SSH)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Déploiement à distance
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.KEY }}
          script: |
            echo "${{ secrets.TOKEN_CICD }}" | docker login ${{ env.REPO }} -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.REPO }}/${{ github.actor }}/${{ env.IMAGE_NAME }}:latest
            docker stop ${{ env.IMAGE_NAME }} || true
            docker rm ${{ env.IMAGE_NAME }} || true
            docker run -d --restart unless-stopped -p 5000:5000 --name ${{ env.IMAGE_NAME }} ${{ env.REPO }}/${{ github.actor }}/${{ env.IMAGE_NAME }}:latest
            sleep 10
            curl -f http://localhost:5000/
            curl -f http://localhost:5000/api/todos

